name: Deploy to GitHub Pages

on:
  push:
    branches: [claude/qlvin-os-react-kit-zSq1b]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: qlvin-os-ui/package-lock.json

      - name: Install
        run: npm ci
        working-directory: qlvin-os-ui

      - name: Build
        run: npm run build
        working-directory: qlvin-os-ui

      - uses: actions/upload-pages-artifact@v3
        with:
          path: qlvin-os-ui/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
