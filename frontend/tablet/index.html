<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>qlevl · شاشة الضيف</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Tajawal:wght@300;400;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<style>
:root {
  --bg: #07090d;
  --bg2: #0b0e14;
  --panel: #0f1218;
  --border: #1a2030;
  --accent: #00c8ff;
  --gold: #f0b429;
  --green: #00e676;
  --red: #ff3d57;
  --orange: #ff7043;
  --purple: #9c6fff;
  --text: #dce6f0;
  --dim: #4a5a6a;
  --mono: 'IBM Plex Mono', monospace;
  --sans: 'Tajawal', sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
body {
  background:var(--bg);color:var(--text);
  font-family:var(--sans);min-height:100vh;
  display:flex;flex-direction:column;
  overflow-x:hidden;
}
body::before {
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:linear-gradient(rgba(0,200,255,.015) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,200,255,.015) 1px,transparent 1px);
  background-size:44px 44px;
}

/* HEADER */
.hdr {
  display:flex;justify-content:space-between;align-items:center;
  padding:18px 28px;border-bottom:1px solid var(--border);
  background:var(--bg2);position:relative;z-index:10;
}
.logo {
  font-family:var(--mono);font-size:22px;font-weight:600;
  color:var(--accent);letter-spacing:-1px;
}
.logo em{color:var(--gold);font-style:normal}
.apt-name{font-size:14px;color:var(--dim)}
.conn-dot{
  width:8px;height:8px;border-radius:50%;
  background:var(--dim);display:inline-block;
  transition:background .3s;
}
.conn-dot.live{background:var(--green);box-shadow:0 0 8px var(--green)}

/* MAIN */
.main {
  flex:1;display:grid;
  grid-template-columns:1fr 340px;
  gap:0;position:relative;z-index:1;
}
@media(max-width:900px){.main{grid-template-columns:1fr}}

/* LEFT — TIMER SECTION */
.timer-section {
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:40px 24px;gap:28px;
}
.welcome {
  text-align:center;
}
.welcome-line1{font-size:13px;color:var(--dim);margin-bottom:6px;letter-spacing:1px}
.welcome-name{font-size:32px;font-weight:900;color:var(--text)}

/* Ring Timer */
.ring-wrap {
  position:relative;width:260px;height:260px;
}
.ring-svg{width:260px;height:260px;transform:rotate(-90deg)}
.ring-bg{fill:none;stroke:var(--border);stroke-width:12}
.ring-progress{
  fill:none;stroke:var(--accent);stroke-width:12;
  stroke-linecap:round;
  stroke-dasharray:720;
  stroke-dashoffset:0;
  transition:stroke-dashoffset .9s linear, stroke .5s;
  filter:drop-shadow(0 0 8px var(--accent));
}
.ring-progress.warning{stroke:var(--orange)}
.ring-progress.critical{stroke:var(--red)}

.ring-center {
  position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;text-align:center;
}
.ring-time{font-family:var(--mono);font-size:38px;font-weight:600;color:var(--text);line-height:1}
.ring-label{font-size:11px;color:var(--dim);margin-top:6px;letter-spacing:1px}

/* EXTEND BUTTONS */
.extend-row {
  display:flex;gap:12px;
}
.btn {
  flex:1;padding:14px 0;border:none;border-radius:12px;
  font-family:var(--sans);font-size:14px;font-weight:700;
  cursor:pointer;transition:all .2s;
}
.btn-extend {
  background:linear-gradient(135deg,rgba(0,200,255,.15),rgba(0,200,255,.08));
  border:1px solid rgba(0,200,255,.3);color:var(--accent);
}
.btn-extend:hover{background:rgba(0,200,255,.2);transform:translateY(-1px)}
.btn-extend.half{font-size:12px}
.btn-primary {
  background:linear-gradient(135deg,var(--accent),#0090cc);
  color:#000;font-weight:900;
}
.btn-primary:hover{opacity:.9;transform:translateY(-1px)}

/* RIGHT PANEL */
.right-panel {
  border-right:1px solid var(--border);
  background:var(--bg2);
  display:flex;flex-direction:column;
  overflow-y:auto;
}

.panel-section {
  padding:22px 20px;border-bottom:1px solid var(--border);
}
.ps-title {
  font-size:11px;font-family:var(--mono);color:var(--dim);
  letter-spacing:2px;text-transform:uppercase;margin-bottom:14px;
}

/* Services */
.service-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.service-btn {
  background:var(--panel);border:1px solid var(--border);
  border-radius:10px;padding:14px 10px;text-align:center;
  cursor:pointer;transition:all .2s;
}
.service-btn:hover{border-color:var(--accent);transform:translateY(-2px)}
.service-btn:active{transform:scale(.97)}
.sb-icon{font-size:24px;display:block;margin-bottom:6px}
.sb-name{font-size:12px;font-weight:700}
.sb-price{font-family:var(--mono);font-size:10px;color:var(--gold);margin-top:3px}

/* WiFi */
.wifi-card{
  background:var(--panel);border:1px solid var(--border);
  border-radius:10px;padding:14px;
}
.wifi-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.wifi-row:last-child{margin-bottom:0}
.wifi-label{font-size:11px;color:var(--dim)}
.wifi-val{font-family:var(--mono);font-size:12px;color:var(--text)}
.copy-btn{
  font-size:10px;color:var(--accent);cursor:pointer;
  background:none;border:none;padding:2px 6px;
  border-radius:4px;border:1px solid rgba(0,200,255,.3);
}

/* Support */
.support-btn{
  width:100%;padding:12px;background:none;
  border:1px solid rgba(0,230,118,.3);border-radius:10px;
  color:var(--green);font-family:var(--sans);font-size:13px;
  font-weight:700;cursor:pointer;transition:all .2s;
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.support-btn:hover{background:rgba(0,230,118,.08)}

/* TOAST */
.toast-wrap{
  position:fixed;top:20px;left:50%;transform:translateX(-50%);
  z-index:100;display:flex;flex-direction:column;gap:8px;
  pointer-events:none;
}
.toast{
  padding:12px 20px;border-radius:10px;font-size:13px;font-weight:700;
  color:#fff;pointer-events:auto;animation:toastIn .3s ease;
  white-space:nowrap;
}
.toast.success{background:#00a854;border:1px solid var(--green)}
.toast.error{background:#cc1a2c;border:1px solid var(--red)}
.toast.info{background:#005f7a;border:1px solid var(--accent)}
@keyframes toastIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}

/* WARNING OVERLAY */
.warning-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(255,61,87,.08);
  border:3px solid var(--red);
  z-index:50;pointer-events:none;
  animation:pulse-border 1s ease-in-out infinite;
}
.warning-overlay.show{display:block}
@keyframes pulse-border{0%,100%{opacity:.4}50%{opacity:1}}

/* VACANT STATE */
.vacant-screen{
  display:none;flex:1;align-items:center;justify-content:center;
  flex-direction:column;gap:16px;text-align:center;padding:40px;
}
.vacant-screen.show{display:flex}
.vacant-logo{font-family:var(--mono);font-size:64px;font-weight:600;color:var(--accent);opacity:.3}
.vacant-msg{color:var(--dim);font-size:16px}

/* MODAL */
.modal-bg{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);
  z-index:200;align-items:center;justify-content:center;
}
.modal-bg.show{display:flex}
.modal{
  background:var(--panel);border:1px solid var(--border);
  border-radius:16px;padding:28px;width:min(400px,92vw);
}
.modal-title{font-size:18px;font-weight:900;margin-bottom:18px}
.modal-opts{display:flex;flex-direction:column;gap:10px;margin-bottom:20px}
.modal-opt{
  display:flex;justify-content:space-between;align-items:center;
  padding:14px 16px;background:var(--bg2);border:1px solid var(--border);
  border-radius:10px;cursor:pointer;transition:all .2s;
}
.modal-opt:hover{border-color:var(--accent)}
.modal-opt.selected{border-color:var(--accent);background:rgba(0,200,255,.08)}
.opt-label{font-size:14px;font-weight:700}
.opt-price{font-family:var(--mono);font-size:13px;color:var(--gold)}
.modal-actions{display:flex;gap:10px}
.btn-cancel{
  flex:1;padding:12px;background:none;border:1px solid var(--border);
  border-radius:10px;color:var(--dim);font-family:var(--sans);
  font-size:14px;cursor:pointer;
}

/* Anims */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.main{animation:fadeIn .4s ease}
</style>
</head>
<body>

<div class="toast-wrap" id="toastWrap"></div>
<div class="warning-overlay" id="warningOverlay"></div>

<!-- Modal التمديد -->
<div class="modal-bg" id="extendModal">
  <div class="modal">
    <div class="modal-title">⏱️ تمديد الوقت</div>
    <div class="modal-opts" id="extendOpts"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">إلغاء</button>
      <button class="btn btn-primary" style="flex:2;padding:12px" onclick="confirmExtend()">تأكيد التمديد</button>
    </div>
  </div>
</div>

<div class="hdr">
  <div class="logo">qlev<em>l</em></div>
  <div class="apt-name" id="aptName">جار التحميل…</div>
  <span class="conn-dot" id="connDot" title="الاتصال"></span>
</div>

<!-- Vacant -->
<div class="vacant-screen" id="vacantScreen">
  <div class="vacant-logo">qlev<span style="color:var(--gold)">l</span></div>
  <div class="vacant-msg">لا يوجد حجز نشط حالياً</div>
</div>

<!-- Active -->
<div class="main" id="mainScreen" style="display:none">

  <div class="timer-section">
    <div class="welcome">
      <div class="welcome-line1">أهلاً وسهلاً</div>
      <div class="welcome-name" id="guestName">—</div>
    </div>

    <div class="ring-wrap">
      <svg class="ring-svg" viewBox="0 0 260 260">
        <circle class="ring-bg" cx="130" cy="130" r="114.6"/>
        <circle class="ring-progress" id="ringProgress" cx="130" cy="130" r="114.6"/>
      </svg>
      <div class="ring-center">
        <div class="ring-time" id="ringTime">--:--</div>
        <div class="ring-label">وقت متبقي</div>
      </div>
    </div>

    <div class="extend-row">
      <button class="btn btn-extend half" onclick="openExtend(0.5)">30 دقيقة</button>
      <button class="btn btn-extend half" onclick="openExtend(1)">ساعة</button>
    </div>
    <button class="btn btn-primary" style="width:100%;max-width:340px;padding:15px" onclick="openExtendModal()">
      ⏱️ تمديد الوقت
    </button>
  </div>

  <div class="right-panel">
    <div class="panel-section">
      <div class="ps-title">الخدمات الإضافية</div>
      <div class="service-grid">
        <div class="service-btn" onclick="orderService('popcorn')">
          <span class="sb-icon">🍿</span>
          <div class="sb-name">فشار</div>
          <div class="sb-price">٢٥ ر.س</div>
        </div>
        <div class="service-btn" onclick="orderService('coffee')">
          <span class="sb-icon">☕</span>
          <div class="sb-name">قهوة</div>
          <div class="sb-price">٢٠ ر.س</div>
        </div>
      </div>
    </div>

    <div class="panel-section">
      <div class="ps-title">معلومات الواي فاي</div>
      <div class="wifi-card">
        <div class="wifi-row">
          <span class="wifi-label">الشبكة</span>
          <span class="wifi-val" id="wifiName">—</span>
        </div>
        <div class="wifi-row">
          <span class="wifi-label">كلمة المرور</span>
          <span style="display:flex;align-items:center;gap:6px">
            <span class="wifi-val" id="wifiPass">—</span>
            <button class="copy-btn" onclick="copyWifi()">نسخ</button>
          </span>
        </div>
      </div>
    </div>

    <div class="panel-section">
      <div class="ps-title">تواصل معنا</div>
      <button class="support-btn" onclick="openSupport()">
        <span>💬</span> تواصل عبر واتساب
      </button>
    </div>
  </div>
</div>

<script>
const SERVER = window.location.origin;
const APT_ID = new URLSearchParams(location.search).get('apt') || '1';
let state = {bookingId: null, totalSeconds: 0, remaining: 0, hourlyRate: 75};
let selectedHours = 0.5;
let ticker = null;

// Socket.IO
const socket = io(SERVER, {transports:['websocket','polling']});
socket.on('connect', () => document.getElementById('connDot').classList.add('live'));
socket.on('disconnect', () => document.getElementById('connDot').classList.remove('live'));
socket.on('expiry_warning', d => {
  document.getElementById('warningOverlay').classList.add('show');
  toast(`⏰ باقي ${d.minutes_left} دقيقة — تبي تمدد؟`, 'info', 6000);
});
socket.on('booking_ended', () => {
  toast('انتهى وقتك. شكراً لزيارتك! 👋', 'info', 5000);
  setTimeout(loadState, 3000);
});

// Load state from API
async function loadState() {
  try {
    const res = await fetch(`${SERVER}/api/tablet/${APT_ID}`);
    const data = await res.json();

    document.getElementById('aptName').textContent = data.apartment?.name || 'الشقة';
    document.getElementById('wifiName').textContent = data.apartment?.wifi_name || '—';
    document.getElementById('wifiPass').textContent = data.apartment?.wifi_pass || '—';
    state.hourlyRate = data.apartment?.hourly_rate || 75;

    if (data.booking) {
      state.bookingId = data.booking.id;
      state.remaining = data.remaining_seconds;

      const end = new Date(data.booking.end_time + 'Z');
      const start = new Date(data.booking.start_time + 'Z');
      state.totalSeconds = Math.max(1, (end - start) / 1000);

      document.getElementById('guestName').textContent = data.booking.guest_name;
      document.getElementById('mainScreen').style.display = 'grid';
      document.getElementById('vacantScreen').classList.remove('show');
      startTicker();
    } else {
      document.getElementById('mainScreen').style.display = 'none';
      document.getElementById('vacantScreen').classList.add('show');
      if (ticker) clearInterval(ticker);
    }
  } catch(e) {
    console.error(e);
  }
}

function startTicker() {
  if (ticker) clearInterval(ticker);
  ticker = setInterval(() => {
    if (state.remaining > 0) state.remaining--;
    updateRing();
  }, 1000);
  updateRing();
}

function updateRing() {
  const r = state.remaining;
  const progress = document.getElementById('ringProgress');
  const timeEl = document.getElementById('ringTime');

  const pct = Math.max(0, Math.min(1, r / state.totalSeconds));
  const circumference = 2 * Math.PI * 114.6;
  progress.style.strokeDasharray = circumference;
  progress.style.strokeDashoffset = circumference * (1 - pct);

  progress.className = 'ring-progress';
  if (r < 600) progress.classList.add('critical');
  else if (r < 1800) progress.classList.add('warning');

  const h = Math.floor(r / 3600);
  const m = Math.floor((r % 3600) / 60);
  const s = r % 60;
  timeEl.textContent = h > 0
    ? `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`
    : `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

// Extend
function openExtend(hours) { openExtendModal(hours); }

function openExtendModal(preselect = null) {
  const opts = [
    {h: 0.5, label: '٣٠ دقيقة', price: 0.5 * state.hourlyRate},
    {h: 1, label: 'ساعة كاملة', price: state.hourlyRate},
    {h: 2, label: 'ساعتان', price: 2 * state.hourlyRate},
  ];
  const container = document.getElementById('extendOpts');
  container.innerHTML = opts.map(o => `
    <div class="modal-opt ${preselect === o.h ? 'selected' : ''}"
         onclick="selectExtend(this, ${o.h})">
      <span class="opt-label">${o.label}</span>
      <span class="opt-price">${o.price} ر.س</span>
    </div>
  `).join('');
  if (preselect) selectedHours = preselect;
  document.getElementById('extendModal').classList.add('show');
}

function selectExtend(el, h) {
  document.querySelectorAll('.modal-opt').forEach(e => e.classList.remove('selected'));
  el.classList.add('selected');
  selectedHours = h;
}

function closeModal() {
  document.getElementById('extendModal').classList.remove('show');
}

async function confirmExtend() {
  if (!state.bookingId) return;
  closeModal();
  try {
    const res = await fetch(`${SERVER}/api/extend`, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({booking_id: state.bookingId, added_hours: selectedHours})
    });
    const data = await res.json();
    if (res.ok) {
      state.remaining += selectedHours * 3600;
      state.totalSeconds += selectedHours * 3600;
      document.getElementById('warningOverlay').classList.remove('show');
      toast(`✅ تم التمديد — وقت الخروج: ${formatTime(data.new_end_time)}`, 'success');
    } else {
      toast(data.error || 'خطأ في التمديد', 'error');
    }
  } catch(e) {
    toast('خطأ في الاتصال', 'error');
  }
}

async function orderService(type) {
  if (!state.bookingId) return;
  const names = {popcorn:'فشار 🍿', coffee:'قهوة ☕'};
  try {
    const res = await fetch(`${SERVER}/api/service/order`, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({booking_id: state.bookingId, service_type: type})
    });
    const data = await res.json();
    if (res.ok) toast(`جار تحضير ${names[type]} — ${data.amount} ر.س ✓`, 'success');
    else toast(data.error || 'خطأ في الطلب', 'error');
  } catch(e) {
    toast('خطأ في الاتصال', 'error');
  }
}

function copyWifi() {
  const pass = document.getElementById('wifiPass').textContent;
  navigator.clipboard.writeText(pass).then(() => toast('تم نسخ كلمة المرور ✓', 'success'));
}

function openSupport() {
  window.open('https://wa.me/', '_blank');
}

function formatTime(dt) {
  if (!dt) return '—';
  const d = new Date(dt + (dt.includes('Z') ? '' : 'Z'));
  return d.toLocaleTimeString('ar-SA', {hour:'2-digit', minute:'2-digit'});
}

function toast(msg, type='info', duration=3500) {
  const wrap = document.getElementById('toastWrap');
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  wrap.appendChild(el);
  setTimeout(() => el.remove(), duration);
}

// Init
loadState();
setInterval(loadState, 30000);
</script>
</body>
</html>
