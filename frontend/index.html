<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>qlevl · الشقة الذكية</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Tajawal:wght@300;400;700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#07090d;--bg2:#0b0e14;--panel:#0f1218;--border:#1a2030;--accent:#00c8ff;--gold:#f0b429;--green:#00e676;--red:#ff3d57;--text:#dce6f0;--dim:#4a5a6a;--mono:'IBM Plex Mono',monospace;--sans:'Tajawal',sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
body::before{content:'';position:fixed;inset:0;pointer-events:none;background-image:linear-gradient(rgba(0,200,255,.015) 1px,transparent 1px),linear-gradient(90deg,rgba(0,200,255,.015) 1px,transparent 1px);background-size:44px 44px}
.wrap{max-width:420px;width:100%;position:relative;z-index:1}
.logo{font-family:var(--mono);font-size:52px;font-weight:600;color:var(--accent);text-align:center;margin-bottom:4px;text-shadow:0 0 40px rgba(0,200,255,.3)}
.logo em{color:var(--gold);font-style:normal}
.tagline{text-align:center;font-size:12px;color:var(--dim);margin-bottom:32px;letter-spacing:2px}
.cards{display:flex;flex-direction:column;gap:10px;margin-bottom:24px}
.card{display:flex;align-items:center;gap:14px;padding:16px 18px;background:var(--panel);border:1px solid var(--border);border-radius:14px;text-decoration:none;color:var(--text);transition:all .2s;cursor:pointer}
.card:hover{border-color:var(--accent);transform:translateY(-2px)}
.card-icon{font-size:28px;flex-shrink:0}
.card-info{flex:1}
.card-name{font-size:15px;font-weight:800;margin-bottom:2px}
.card-desc{font-size:11px;color:var(--dim)}
.card-arrow{color:var(--dim);font-size:18px}
.divider{border:none;border-top:1px solid var(--border);margin:8px 0}
.api-section{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px}
.api-label{font-size:11px;color:var(--dim);margin-bottom:8px;letter-spacing:1px}
.api-row{display:flex;gap:8px}
.api-input{flex:1;padding:10px 12px;background:var(--panel);border:1px solid var(--border);border-radius:9px;color:var(--text);font-family:var(--mono);font-size:12px;outline:none}
.api-input:focus{border-color:var(--accent)}
.api-btn{padding:10px 14px;background:var(--accent);border:none;border-radius:9px;color:#000;font-weight:900;font-size:12px;cursor:pointer;white-space:nowrap}
.api-current{margin-top:6px;font-family:var(--mono);font-size:10px;color:var(--dim)}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">qlev<em>l</em></div>
  <div class="tagline">SMART APARTMENT OS</div>

  <div class="cards">
    <a class="card" href="booking/index.html?apt=1">
      <div class="card-icon">📱</div>
      <div class="card-info">
        <div class="card-name">حجز شقة</div>
        <div class="card-desc">للضيف — احجز واحصل على كودك</div>
      </div>
      <div class="card-arrow">←</div>
    </a>
    <a class="card" href="tablet/index.html?apt=1">
      <div class="card-icon">🖥️</div>
      <div class="card-info">
        <div class="card-name">شاشة الضيف</div>
        <div class="card-desc">تابلت داخل الشقة</div>
      </div>
      <div class="card-arrow">←</div>
    </a>
    <hr class="divider">
    <a class="card" href="host/index.html?apt=1">
      <div class="card-icon">📲</div>
      <div class="card-info">
        <div class="card-name">لوحة المضيف</div>
        <div class="card-desc">إدارة الشقة من الجوال</div>
      </div>
      <div class="card-arrow">←</div>
    </a>
    <a class="card" href="owner/index.html">
      <div class="card-icon">🏠</div>
      <div class="card-info">
        <div class="card-name">لوحة المالك</div>
        <div class="card-desc">أرباحك وشققك</div>
      </div>
      <div class="card-arrow">←</div>
    </a>
    <a class="card" href="founder/index.html">
      <div class="card-icon">👑</div>
      <div class="card-info">
        <div class="card-name">لوحة المؤسس</div>
        <div class="card-desc">إدارة كاملة للمنصة</div>
      </div>
      <div class="card-arrow">←</div>
    </a>
  </div>

  <div class="api-section">
    <div class="api-label">عنوان السيرفر (API URL)</div>
    <div class="api-row">
      <input class="api-input" id="apiInput" placeholder="https://your-server.railway.app">
      <button class="api-btn" onclick="saveApi()">حفظ</button>
    </div>
    <div class="api-current" id="apiCurrent"></div>
  </div>
</div>

<script>
const saved = localStorage.getItem('QLEVL_API');
if (saved) {
  document.getElementById('apiInput').value = saved;
  document.getElementById('apiCurrent').textContent = '✓ محفوظ: ' + saved;
}
function saveApi() {
  const v = document.getElementById('apiInput').value.trim().replace(/\/$/, '');
  if (!v) return;
  localStorage.setItem('QLEVL_API', v);
  document.getElementById('apiCurrent').textContent = '✓ تم الحفظ: ' + v;
}
</script>
</body>
</html>
